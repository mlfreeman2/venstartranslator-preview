name: Bug report
description: Something in the listener integration doesn't work as documented
labels: ["bug"]
body:
  - type: input
    id: ha-version
    attributes:
      label: Home Assistant version
      placeholder: "2026.4.1"
    validations:
      required: true
  - type: input
    id: integration-version
    attributes:
      label: Integration version
      description: Shown in HACS, or in `custom_components/venstar_acc_tsenwifi_listener/manifest.json`
      placeholder: "0.1.0"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened, and what did you expect?
    validations:
      required: true
  - type: checkboxes
    id: network
    attributes:
      label: Network checklist
      description: Receiving UDP broadcasts only works inside one broadcast domain.
      options:
        - label: Home Assistant is on the same VLAN/broadcast domain as the sensors
          required: true
        - label: "If HA runs in Docker, it uses `network_mode: host`"
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics download
      description: |
        In HA: Settings → Devices & Services → Venstar ACC-TSENWIFI Listener → ⋮ → Download diagnostics.
        Paste or attach the JSON. (This includes the sensor roster and packet counters — the first thing
        needed for any "my sensor isn't showing up" question.)
      render: json
  - type: textarea
    id: debug-log
    attributes:
      label: Debug log (if relevant)
      description: |
        ```yaml
        logger:
          logs:
            custom_components.venstar_acc_tsenwifi_listener: debug
        ```
      render: text
