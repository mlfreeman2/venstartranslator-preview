name: Physical sensor report
description: You own real Venstar ACC-TSENWIFI(PRO) sensors — your report answers questions no emulator can (success reports are just as valuable as failures!)
labels: ["hardware-report"]
body:
  - type: markdown
    attributes:
      value: |
        This integration was developed **without access to physical sensors** — every packet it has ever
        decoded came from an emulator. Several real-hardware behaviors are documented as *unknowns* in the
        implementation plan, and reports like yours are the only way they get answered. Thank you!
  - type: dropdown
    id: part
    attributes:
      label: Sensor part number
      options:
        - ACC-TSENWIFI
        - ACC-TSENWIFIPRO
        - Other / unsure (describe in notes)
    validations:
      required: true
  - type: dropdown
    id: outcome
    attributes:
      label: Outcome
      options:
        - Sensor(s) discovered and updating in HA
        - Discovered, but readings have problems
        - Not discovered at all
        - Other / partial (describe below)
    validations:
      required: true
  - type: checkboxes
    id: observations
    attributes:
      label: Observations (each one answers a documented hardware unknown)
      options:
        - label: A humidity entity appeared (i.e. the sensor actually reports humidity)
        - label: The battery entity shows values other than 100%
        - label: The sensor survived an HA restart and came back correctly
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics download
      description: |
        Settings → Devices & Services → Venstar ACC-TSENWIFI Listener → ⋮ → Download diagnostics.
        This captures the MAC format, firmware version, and packet counters from your real hardware.
      render: json
  - type: textarea
    id: capture
    attributes:
      label: Packet capture (the most valuable artifact)
      description: |
        If you can, attach a `venstar-protobuf-capture/1` file of your sensors' raw packets
        (saved from the C# VenstarTranslator app's Protobuf Listener page).

        ⚠️ **Before attaching, be aware:** a capture taken while a sensor was being configured for Wi-Fi
        can contain your **Wi-Fi password in cleartext** (that's the wire protocol, not our choice).
        Captures of normal temperature broadcasts do not contain credentials — but review before posting.
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Sensor firmware version if known, how many sensors, anything surprising.
