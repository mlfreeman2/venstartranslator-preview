name: Build and Push Docker Image

on:
  push:
    branches: [ main, beta ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, beta ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore ../VenstarTranslator.sln
      working-directory: VenstarTranslator.Tests

    - name: Build
      run: dotnet build ../VenstarTranslator.sln --no-restore --configuration Release
      working-directory: VenstarTranslator.Tests

    - name: Run unit tests with coverage
      run: dotnet test VenstarTranslator.Tests.csproj --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --settings ../coverlet.runsettings --results-directory ./coverage
      working-directory: VenstarTranslator.Tests

    - name: Check for vulnerable packages
      run: dotnet list package --vulnerable --include-transitive
      continue-on-error: true

    - name: Code Coverage Report
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: VenstarTranslator.Tests/coverage/**/coverage.cobertura.xml
        badge: true
        # Hard floor: fail the build below 85% line coverage (94.4% at the time
        # this gate was set — lower the number only with a reason, not by drift).
        fail_below_min: true
        format: markdown
        hide_branch_rate: false
        hide_complexity: true
        indicators: true
        output: both
        thresholds: '85 95'

    - name: Add Coverage PR Comment
      uses: marocchino/sticky-pull-request-comment@v3
      if: github.event_name == 'pull_request'
      with:
        recreate: true
        path: code-coverage-results.md

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Generate timestamp
      id: timestamp
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/beta')
      run: |
        echo "timestamp=$(TZ='America/New_York' date +'%Y%m%d%H%M')" >> $GITHUB_OUTPUT

    - name: Extract branch name
      id: branch
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/beta')
      run: |
        echo "name=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT

    - name: Compute build version
      id: version
      # The stamped version (BUILD_VERSION -> /api/version and the UI footer)
      # always equals the primary image tag: X.Y.Z for release tags,
      # {branch}-{timestamp} for branch pushes, "dev" otherwise (PR builds).
      run: |
        if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
          echo "value=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        elif [[ -n "${{ steps.branch.outputs.name }}" ]]; then
          echo "value=${{ steps.branch.outputs.name }}-${{ steps.timestamp.outputs.timestamp }}" >> $GITHUB_OUTPUT
        else
          echo "value=dev" >> $GITHUB_OUTPUT
        fi

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v6
      env:
        # Emit annotations on the manifest index too, so the package page picks up
        # the description for multi-arch images (not just the per-arch image config).
        # metadata-action sources the description annotation from the GitHub repo's
        # description field, so that must be set for the package page to show it.
        DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=${{ steps.branch.outputs.name }}-${{ steps.timestamp.outputs.timestamp }},enable=${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/beta') }}
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        platforms: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/beta' || startsWith(github.ref, 'refs/tags/v')) && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
        push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/beta' || startsWith(github.ref, 'refs/tags/v')) }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        annotations: ${{ steps.meta.outputs.annotations }}
        build-args: |
          BUILD_VERSION=${{ steps.version.outputs.value }}
          GIT_SHA=${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
